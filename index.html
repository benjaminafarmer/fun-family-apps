<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Beaches Turks & Caicos — Interactive Resort Map</title>
<style>
  :root{
    --ink:#0f2438;
    --sand:#f6f1e6;
    --sand-deep:#ece2cc;
    --sea:#0f7fa3;
    --sea-deep:#0a5d78;
    --coral:#e8623a;
    --line:rgba(15,36,56,0.12);
    --card-shadow: 0 10px 30px rgba(10,40,60,0.18);
    --cat-accommodation:#1B8FBF;
    --cat-pools:#E0392B;
    --cat-activities:#1E3A5F;
    --cat-sports:#7B1E3A;
    --cat-restaurants:#D6127A;
    --cat-shops:#0FA88E;
    --cat-misc:#F08A1E;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--sand);
    color:var(--ink);
    overscroll-behavior:none;
  }

  /* ---------- Header ---------- */
  header{
    position:sticky; top:0; z-index:40;
    background:linear-gradient(135deg,var(--sea-deep),var(--sea));
    color:#fff;
    padding:14px 16px 12px;
    box-shadow:0 4px 16px rgba(10,40,60,0.25);
  }
  .title-row{
    display:flex; align-items:baseline; justify-content:space-between; gap:8px;
  }
  .title-row h1{
    font-size:18px; margin:0; font-weight:700; letter-spacing:0.2px;
  }
  .title-row .sub{
    font-size:11px; opacity:0.85; font-weight:500; white-space:nowrap;
  }
  .search-wrap{
    margin-top:10px;
    position:relative;
  }
  #searchInput{
    width:100%;
    padding:11px 40px 11px 14px;
    border-radius:12px;
    border:none;
    font-size:16px;
    outline:none;
    background:rgba(255,255,255,0.96);
    color:var(--ink);
  }
  .search-wrap svg{
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; opacity:0.5; pointer-events:none;
  }
  .clear-btn{
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    background:var(--line); border:none; border-radius:50%;
    width:22px;height:22px; display:none; align-items:center; justify-content:center;
    cursor:pointer; color:var(--ink); font-size:14px; line-height:1;
  }

  /* ---------- Category filter chips ---------- */
  .chip-row{
    display:flex; gap:6px; overflow-x:auto; padding:10px 12px 4px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;
    padding:6px 12px;
    border-radius:999px;
    font-size:12.5px;
    font-weight:600;
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--ink);
    white-space:nowrap;
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition:transform .1s ease;
  }
  .chip:active{transform:scale(0.96);}
  .chip .dot{width:8px;height:8px;border-radius:50%;}
  .chip.active{
    color:#fff;
    border-color:transparent;
  }

  /* ---------- Results dropdown ---------- */
  #resultsList{
    display:none;
    position:absolute;
    left:12px; right:12px; top:100%;
    margin-top:6px;
    background:#fff;
    border-radius:12px;
    box-shadow:var(--card-shadow);
    max-height:60vh;
    overflow-y:auto;
    z-index:50;
  }
  #resultsList.show{display:block;}
  .result-item{
    display:flex; align-items:center; gap:10px;
    padding:11px 14px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    color:var(--ink);
  }
  .result-item:last-child{border-bottom:none;}
  .result-item:active{background:var(--sand);}
  .result-badge{
    flex:0 0 auto;
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff; font-size:12px; font-weight:700;
  }
  .result-text{flex:1; min-width:0;}
  .result-name{font-size:14px; font-weight:600; line-height:1.25;}
  .result-cat{font-size:11.5px; color:#5b6b78; margin-top:1px;}
  .no-results{padding:18px 14px; text-align:center; color:#5b6b78; font-size:13.5px;}

  /* ---------- Map area ---------- */
  .map-scroll{
    position:relative;
    width:100%;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    touch-action:pan-x pan-y;
    background:var(--sand-deep);
  }
  .map-inner{
    position:relative;
    transform-origin:0 0;
  }
  .map-inner img{
    display:block;
    width:100%;
    height:auto;
    user-select:none;
    -webkit-user-drag:none;
  }
  .pin-wrap{
    position:absolute;
    width:0;height:0;
    transform:scale(var(--pin-scale,1));
  }
  .pin{
    position:absolute;
    left:-13px; top:-28.6px;
    width:26px;height:26px;
    border-radius:50% 50% 50% 0;
    transform:rotate(-45deg);
    display:flex;align-items:center;justify-content:center;
    border:2px solid #fff;
    box-shadow:0 2px 6px rgba(0,0,0,0.35);
    cursor:pointer;
    transition:filter .15s ease;
  }
  .pin span{
    transform:rotate(45deg);
    color:#fff;
    font-size:10.5px;
    font-weight:800;
  }
  .pin-wrap.dim{opacity:0.18;}
  .pin.highlight{
    z-index:30;
    animation:bounce 0.6s ease;
  }
  @keyframes bounce{
    0%{transform:rotate(-45deg) scale(0.4);}
    60%{transform:rotate(-45deg) scale(1.25);}
    100%{transform:rotate(-45deg) scale(1);}
  }

  /* ---------- Zoom controls ---------- */
  .zoom-controls{
    position:fixed;
    right:14px; bottom:24px;
    display:flex; flex-direction:column; gap:8px;
    z-index:35;
  }
  .zoom-btn{
    width:42px;height:42px;
    border-radius:50%;
    background:#fff;
    border:1px solid var(--line);
    box-shadow:var(--card-shadow);
    font-size:20px; font-weight:700;
    color:var(--ink);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .zoom-btn:active{background:var(--sand);}

  /* ---------- Legend toggle ---------- */
  .legend-toggle{
    position:fixed;
    left:14px; bottom:24px;
    background:#fff;
    border:1px solid var(--line);
    box-shadow:var(--card-shadow);
    border-radius:999px;
    padding:10px 16px;
    font-size:13px; font-weight:700;
    color:var(--ink);
    cursor:pointer;
    z-index:35;
    display:flex; align-items:center; gap:6px;
  }

  /* ---------- Bottom sheet (location detail) ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(15,36,56,0.35);
    z-index:60; opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .sheet-backdrop.show{opacity:1; pointer-events:auto;}
  .sheet{
    position:fixed; left:0; right:0; bottom:0;
    background:#fff;
    border-radius:18px 18px 0 0;
    box-shadow:0 -10px 30px rgba(10,40,60,0.25);
    z-index:61;
    transform:translateY(100%);
    transition:transform .25s cubic-bezier(.32,.72,0,1);
    padding:10px 20px 26px;
    max-height:70vh;
    overflow-y:auto;
  }
  .sheet.show{transform:translateY(0);}
  .sheet-handle{
    width:38px;height:4px;background:var(--line);border-radius:99px;
    margin:2px auto 14px;
  }
  .sheet-badge{
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;font-size:17px;
    margin-bottom:12px;
    box-shadow:0 3px 8px rgba(0,0,0,0.2);
  }
  .sheet h2{margin:0 0 4px; font-size:19px; line-height:1.3;}
  .sheet .cat-label{
    font-size:12.5px; font-weight:700; letter-spacing:.3px;
    text-transform:uppercase; margin-bottom:2px;
  }
  .sheet .num-label{font-size:12.5px; color:#5b6b78;}
  .next-spot-btn{
    margin-top:14px;
    padding:11px 18px;
    border:none; border-radius:12px;
    background:var(--sea); color:#fff;
    font-size:14.5px; font-weight:700;
    cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
  }
  .next-spot-btn:active{background:var(--sea-deep);}
  .sheet-actions{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;}
  .action-btn{
    padding:11px 16px; border:none; border-radius:12px;
    font-size:14.5px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px;
  }
  .action-btn.primary{background:var(--sea); color:#fff;}
  .action-btn.primary:active{background:var(--sea-deep);}
  .action-btn.secondary{background:#eef3f6; color:var(--ink);}
  .action-btn.secondary:active{background:#dde6ec;}
  #routeSvg{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:8;
  }
  .route-banner{
    position:absolute; left:50%; transform:translateX(-50%);
    top:10px; z-index:40;
    background:var(--ink); color:#fff;
    padding:10px 16px; border-radius:14px;
    font-size:14px; font-weight:600;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
    display:none; align-items:center; gap:10px;
    max-width:92%;
  }
  .route-banner.show{display:flex;}
  .route-banner button{
    border:none; background:rgba(255,255,255,0.18); color:#fff;
    border-radius:9px; padding:6px 10px; font-weight:700; cursor:pointer; font-size:13px;
  }
  .toast{
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:12px;
    font-size:14px; font-weight:600; z-index:120; opacity:0;
    transition:opacity .25s ease; pointer-events:none;
  }
  .toast.show{opacity:1;}
  .locate-btn{
    position:absolute; right:16px; bottom:170px; z-index:60;
    width:52px; height:52px; border-radius:50%;
    background:#fff; border:none; font-size:22px;
    box-shadow:0 3px 10px rgba(0,0,0,0.22); cursor:pointer;
  }
  .locate-btn.on{background:var(--sea); color:#fff;}
  #userSvg{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:7;
  }
  .user-dot-wrap{
    position:absolute; width:0; height:0; z-index:25;
    transform:scale(var(--pin-scale,1));
    display:none;
  }
  .user-dot{
    position:absolute; left:-10px; top:-10px;
    width:20px; height:20px; border-radius:50%;
    background:#1a73e8; border:3px solid #fff;
    box-shadow:0 1px 6px rgba(0,0,0,0.4);
  }
  .user-dot::after{
    content:''; position:absolute; inset:-9px; border-radius:50%;
    border:2px solid #1a73e8; opacity:0.6;
    animation:userPulse 2s ease-out infinite;
  }
  @keyframes userPulse{
    0%{transform:scale(0.6); opacity:0.7;}
    100%{transform:scale(1.6); opacity:0;}
  }
  .cal-sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:110;
    background:#fff; border-radius:22px 22px 0 0;
    box-shadow:0 -6px 30px rgba(0,0,0,0.25);
    padding:14px 20px 26px; transform:translateY(110%);
    transition:transform .28s ease; max-height:72vh; overflow:auto;
  }
  .cal-sheet.show{transform:translateY(0);}
  .cal-sheet h3{margin:8px 0 4px; font-size:18px;}
  .cal-sheet p{margin:6px 0; font-size:13.5px; color:#4a5a66; line-height:1.45;}
  .cal-fix{
    display:flex; align-items:center; gap:10px;
    padding:9px 0; border-bottom:1px solid #eef2f5; font-size:13.5px;
  }
  .cal-fix .res{margin-left:auto; color:#5b6b78; font-variant-numeric:tabular-nums;}
  .cal-fix button{
    border:none; background:#fde8e8; color:#c0392b;
    border-radius:8px; padding:5px 9px; font-weight:700; cursor:pointer;
  }
  .cal-status{
    font-size:13px; font-weight:700; padding:8px 12px; border-radius:10px;
    background:#eef3f6; margin:10px 0; display:inline-block;
  }
  .cal-status.good{background:#e6f6ea; color:#1a7d36;}
  .cal-status.warn{background:#fdf3e0; color:#a06a00;}
  .cal-sheet .sheet-actions{
    position:sticky; bottom:0; background:#fff;
    padding:12px 0 4px; margin-top:8px;
    border-top:1px solid #eef2f5;
  }

  /* ---------- Legend sheet ---------- */
  .legend-sheet .cat-block{margin-bottom:16px;}
  .legend-sheet .cat-title{
    font-size:13.5px; font-weight:800; text-transform:uppercase; letter-spacing:.3px;
    margin-bottom:8px; display:flex; align-items:center; gap:8px;
  }
  .legend-sheet .cat-title .dot{width:10px;height:10px;border-radius:50%;}
  .legend-sheet .item-row{
    font-size:13.5px; padding:5px 0; color:var(--ink); display:flex; gap:8px;
    border-bottom:1px solid var(--line);
  }
  .legend-sheet .item-row .n{font-weight:700; color:#5b6b78; width:28px; flex:0 0 auto;}

  .hint{
    text-align:center; font-size:12px; color:#5b6b78; padding:8px 20px 2px;
  }
</style>
</head>

<header>
  <div class="title-row">
    <h1>Beaches Turks &amp; Caicos</h1>

    <button class="clear-btn" id="clearBtn">✕</button>
    <div id="resultsList"></div>
  </div>
  <div class="chip-row" id="chipRow"></div>
</header>

<div class="route-banner" id="pickBanner">
  <span>Now tap your <b>starting point</b> pin</span>
  <button id="pickCancel">Cancel</button>
</div>
<div class="route-banner" id="routeInfo">

  <button id="routeShare">Share</button>

</div>
<div class="toast" id="toast"></div>
<button class="locate-btn" id="locateBtn" aria-label="Show my location" title="My location">&#128205;</button>
<div class="route-banner" id="calBanner">

  <button id="calDone">Done</button>
</div>
<div class="cal-sheet" id="calSheet">
  <h3>&#128205; Show my location &mdash; setup</h3>

</div>
<div class="hint" id="hintText">Pinch or double-tap to zoom · tap a pin for details</div>

<div class="map-scroll" id="mapScroll">

    <svg id="userSvg" viewBox="0 0 1200 938" preserveAspectRatio="none"></svg>

  </div>
</div>

<div class="zoom-controls">

  <div class="zoom-btn" id="zoomOut">–</div>
</div>

<div class="legend-toggle" id="legendToggle">🗺️ Legend</div>

<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="detailSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-badge" id="sheetBadge"></div>
  <div class="cat-label" id="sheetCat"></div>
  <h2 id="sheetName"></h2>
  <div class="num-label" id="sheetNum"></div>
  <button class="next-spot-btn" id="nextSpotBtn" style="display:none">Show next spot &#8594;</button>
  <div class="sheet-actions">
    <button class="action-btn primary" id="shareBtn">&#128279; Share this spot</button>
    <button class="action-btn secondary" id="dirBtn">&#129517; Walking directions</button>
  </div>
</div>

<div class="sheet legend-sheet" id="legendSheet">
  <div class="sheet-handle"></div>
  <div id="legendContent"></div>
</div>

const CATEGORY_COLORS = {
  "Accommodation": "#1B8FBF",
  "Pools & Whirlpools": "#E0392B",
  "Activities": "#1E3A5F",
  "Land & Water Sports": "#7B1E3A",
  "Restaurants & Bars": "#D6127A",
  "Shops & Retail": "#0FA88E",
  "Miscellaneous": "#F08A1E"
};
const CATEGORY_ORDER = ["Accommodation","Pools & Whirlpools","Activities","Land & Water Sports","Restaurants & Bars","Shops & Retail","Miscellaneous"];

document.getElementById('mapImg').src = MAP_IMG_SRC;

// ---------- Build pins ----------
const pinLayer = document.getElementById('pinLayer');
const pinEls = {};   // id -> [wrapEl, ...]
LOCATIONS.forEach(loc => {
  pinEls[loc.id] = [];
  loc.points.forEach((pt, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'pin-wrap';
    wrap.style.left = pt.x + '%';
    wrap.style.top = pt.y + '%';
    const pin = document.createElement('div');
    pin.className = 'pin';
    pin.style.background = CATEGORY_COLORS[loc.category] || '#333';
    pin.setAttribute('role','button');
    pin.setAttribute('aria-label', loc.name + ' (marker ' + loc.id + ')');
    const span = document.createElement('span');
    span.textContent = loc.id;
    pin.appendChild(span);
    pin.addEventListener('click', (e) => {
      e.stopPropagation();
      if(calibrating){
        captureFixAt(loc, i);
        return;
      }
      if(pickingFor){
        const fromKey = loc.id + '.' + i;
        if(fromKey === pickingFor){ showToast('Pick a different starting pin'); return; }
        pickBanner.classList.remove('show');
        const dest = pickingFor; pickingFor = null;
        drawRoute(fromKey, dest);
        return;
      }
      openDetail(loc, i);
    });
    wrap.appendChild(pin);
    pinLayer.appendChild(wrap);
    pinEls[loc.id].push(wrap);
  });
});

// ---------- Category chips ----------
const chipRow = document.getElementById('chipRow');
let activeCategory = null;

function makeChip(label, color, isAll){
  const chip = document.createElement('div');
  chip.className = 'chip';
  if(!isAll){
    const dot = document.createElement('span');
    dot.className = 'dot';
    dot.style.background = color;
    chip.appendChild(dot);
  }
  const text = document.createElement('span');
  text.textContent = label;
  chip.appendChild(text);
  chip.addEventListener('click', () => {
    if(isAll){
      activeCategory = null;
    } else {
      activeCategory = (activeCategory === label) ? null : label;
    }
    refreshChips();
    applyFilter();
  });
  return chip;
}

const FAMILY_FAVES = [64, 41, 57, 56, 52, 63, 61, 47, 66, 39, 100, 99, 95, 54, 65];
const FAMILY_LABEL = '\u2b50 Family favorites';

const allChip = makeChip('All', null, true);
chipRow.appendChild(allChip);
chipRow.appendChild(makeChip(FAMILY_LABEL, '#F0B41E', false));
CATEGORY_ORDER.forEach(cat => {
  chipRow.appendChild(makeChip(cat, CATEGORY_COLORS[cat], false));
});

function refreshChips(){
  const chips = chipRow.querySelectorAll('.chip');
  chips.forEach((chip, i) => {
    const isAllChip = i === 0;
    const isFaves = i === 1;
    const label = isAllChip ? null : (isFaves ? FAMILY_LABEL : CATEGORY_ORDER[i-2]);
    const active = isAllChip ? (activeCategory === null) : (activeCategory === label);
    chip.classList.toggle('active', active);
    chip.style.background = active ? (isAllChip ? 'var(--sea)' : (isFaves ? '#E09A00' : CATEGORY_COLORS[label])) : '#fff';
    chip.style.color = active ? '#fff' : 'var(--ink)';
  });
}
refreshChips();

function applyFilter(){
  const q = searchInput.value.trim().toLowerCase();
  LOCATIONS.forEach(loc => {
    const matchesCat = !activeCategory
      || loc.category === activeCategory
      || (activeCategory === FAMILY_LABEL && FAMILY_FAVES.includes(loc.id));
    const matchesQuery = !q || loc.name.toLowerCase().includes(q) || loc.category.toLowerCase().includes(q) || String(loc.id) === q;
    const visible = matchesCat && matchesQuery;
    pinEls[loc.id].forEach(w => w.classList.toggle('dim', !visible));
  });
}

// ---------- Search ----------
const searchInput = document.getElementById('searchInput');
const resultsList = document.getElementById('resultsList');
const clearBtn = document.getElementById('clearBtn');

function renderResults(query){
  const q = query.trim().toLowerCase();
  if(!q){
    resultsList.classList.remove('show');
    resultsList.innerHTML = '';
    return;
  }
  const matches = LOCATIONS.filter(loc =>
    loc.name.toLowerCase().includes(q) ||
    loc.category.toLowerCase().includes(q) ||
    String(loc.id) === q
  ).slice(0, 25);

  resultsList.innerHTML = '';
  if(matches.length === 0){
    const div = document.createElement('div');
    div.className = 'no-results';
    div.textContent = 'No matching locations found';
    resultsList.appendChild(div);
  } else {
    matches.forEach(loc => {
      const item = document.createElement('div');
      item.className = 'result-item';
      const badge = document.createElement('div');
      badge.className = 'result-badge';
      badge.style.background = CATEGORY_COLORS[loc.category];
      badge.textContent = loc.id;
      const text = document.createElement('div');
      text.className = 'result-text';
      const name = document.createElement('div');
      name.className = 'result-name';
      name.textContent = loc.name;
      const cat = document.createElement('div');
      cat.className = 'result-cat';
      cat.textContent = loc.category;
      text.appendChild(name);
      text.appendChild(cat);
      item.appendChild(badge);
      item.appendChild(text);
      item.addEventListener('click', () => {
        resultsList.classList.remove('show');
        searchInput.blur();
        panToLocation(loc, 0);
        openDetail(loc, 0);
      });
      resultsList.appendChild(item);
    });
  }
  resultsList.classList.add('show');
}

searchInput.addEventListener('input', () => {
  clearBtn.style.display = searchInput.value ? 'flex' : 'none';
  renderResults(searchInput.value);
  applyFilter();
});
searchInput.addEventListener('focus', () => {
  if(searchInput.value) renderResults(searchInput.value);
});
document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')){
    resultsList.classList.remove('show');
  }
});
clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  resultsList.classList.remove('show');
  applyFilter();
  searchInput.focus();
});

// ---------- Pan / zoom ----------
const mapScroll = document.getElementById('mapScroll');
const mapInner = document.getElementById('mapInner');
const mapImg = document.getElementById('mapImg');
let scale = 1;
let MIN_SCALE = 0.3;   // recomputed to fit map width on screen
const MAX_SCALE = 3.2;

function fitScale(){
  const w = mapScroll.clientWidth || window.innerWidth;
  return mapImg.naturalWidth ? Math.min(1, w / mapImg.naturalWidth) : 1;
}
function updatePinScale(){
  // keep pins a comfortable, tappable size on screen at any zoom level
  const target = Math.min(30, Math.max(17, 26 * scale));
  mapInner.style.setProperty('--pin-scale', (target / (26 * scale)).toFixed(3));
}

function layoutHeight(){
  const headerH = document.querySelector('header').offsetHeight;
  const hintH = document.getElementById('hintText').offsetHeight;
  mapScroll.style.height = (window.innerHeight - headerH - hintH) + 'px';
  MIN_SCALE = fitScale();
  if(scale < MIN_SCALE) setScale(MIN_SCALE);
}
window.addEventListener('resize', layoutHeight);

function setScale(newScale, originX, originY){
  newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, newScale));
  const rect = mapScroll.getBoundingClientRect();
  const prevScrollLeft = mapScroll.scrollLeft;
  const prevScrollTop = mapScroll.scrollTop;
  const cx = (originX !== undefined) ? originX : rect.width/2;
  const cy = (originY !== undefined) ? originY : rect.height/2;
  const contentX = (prevScrollLeft + cx) / scale;
  const contentY = (prevScrollTop + cy) / scale;

  scale = newScale;
  mapInner.style.transform = `scale(${scale})`;
  mapInner.style.width = mapImg.naturalWidth ? mapImg.naturalWidth + 'px' : '100%';
  updatePinScale();

  requestAnimationFrame(() => {
    mapScroll.scrollLeft = contentX*scale - cx;
    mapScroll.scrollTop = contentY*scale - cy;
  });
}

document.getElementById('zoomIn').addEventListener('click', () => setScale(scale + 0.5));
document.getElementById('zoomOut').addEventListener('click', () => setScale(scale - 0.5));

// pinch to zoom
let pinchStartDist = null;
let pinchStartScale = 1;
mapScroll.addEventListener('touchstart', (e) => {
  if(e.touches.length === 2){
    pinchStartDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchStartScale = scale;
  }
}, {passive:true});
mapScroll.addEventListener('touchmove', (e) => {
  if(e.touches.length === 2 && pinchStartDist){
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const rect = mapScroll.getBoundingClientRect();
    const midX = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
    const midY = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;
    setScale(pinchStartScale * (dist/pinchStartDist), midX, midY);
  }
}, {passive:true});
mapScroll.addEventListener('touchend', (e) => {
  if(e.touches.length < 2) pinchStartDist = null;
});

// double click / double tap zoom
let lastTap = 0;
mapScroll.addEventListener('click', (e) => {
  const now = Date.now();
  if(now - lastTap < 300){
    const rect = mapScroll.getBoundingClientRect();
    setScale(scale >= 2 ? MIN_SCALE : scale + 1, e.clientX - rect.left, e.clientY - rect.top);
  }
  lastTap = now;
});

function panToLocation(loc, ptIndex){
  const pt = loc.points[ptIndex || 0];
  if(scale < 1.8){ setScale(2); }
  requestAnimationFrame(() => {
    const rect = mapScroll.getBoundingClientRect();
    const targetX = (pt.x/100) * mapImg.naturalWidth * scale;
    const targetY = (pt.y/100) * mapImg.naturalHeight * scale;
    mapScroll.scrollTo({
      left: targetX - rect.width/2,
      top: targetY - rect.height/2,
      behavior: 'smooth'
    });
  });
}

// ---------- Detail sheet ----------
const sheetBackdrop = document.getElementById('sheetBackdrop');
const detailSheet = document.getElementById('detailSheet');
const legendSheet = document.getElementById('legendSheet');
let currentHighlight = null;

let currentLoc = null;
let currentPt = 0;

function openDetail(loc, ptIndex){
  currentLoc = loc;
  currentPt = ptIndex || 0;
  document.getElementById('sheetBadge').style.background = CATEGORY_COLORS[loc.category];
  document.getElementById('sheetBadge').textContent = loc.id;
  document.getElementById('sheetCat').textContent = loc.category;
  document.getElementById('sheetCat').style.color = CATEGORY_COLORS[loc.category];
  document.getElementById('sheetName').textContent = loc.name;

  const n = loc.points.length;
  const numEl = document.getElementById('sheetNum');
  const nextBtn = document.getElementById('nextSpotBtn');
  if(n > 1){
    numEl.textContent = 'Marker #' + loc.id + ' \u00b7 found at ' + n + ' spots (viewing ' + (currentPt+1) + ' of ' + n + ')';
    nextBtn.style.display = 'inline-flex';
  } else {
    numEl.textContent = 'Map marker #' + loc.id;
    nextBtn.style.display = 'none';
  }

  legendSheet.classList.remove('show');
  sheetBackdrop.classList.add('show');
  detailSheet.classList.add('show');

  clearHighlights();
  pinEls[loc.id].forEach((w, i) => {
    const pin = w.querySelector('.pin');
    pin.classList.remove('highlight');
    if(i === currentPt){
      void pin.offsetWidth;           // restart bounce
      pin.classList.add('highlight');
    }
  });
  currentHighlight = pinEls[loc.id];
}
function clearHighlights(){
  if(currentHighlight){
    currentHighlight.forEach(w => w.querySelector('.pin').classList.remove('highlight'));
    currentHighlight = null;
  }
}
document.getElementById('nextSpotBtn').addEventListener('click', () => {
  if(!currentLoc) return;
  const next = (currentPt + 1) % currentLoc.points.length;
  panToLocation(currentLoc, next);
  openDetail(currentLoc, next);
});
function closeSheets(){
  detailSheet.classList.remove('show');
  legendSheet.classList.remove('show');
  const cs = document.getElementById('calSheet');
  if(cs) cs.classList.remove('show');
  sheetBackdrop.classList.remove('show');
  clearHighlights();
}
sheetBackdrop.addEventListener('click', closeSheets);

// ---------- Legend sheet ----------
const legendContent = document.getElementById('legendContent');
CATEGORY_ORDER.forEach(cat => {
  const block = document.createElement('div');
  block.className = 'cat-block';
  const title = document.createElement('div');
  title.className = 'cat-title';
  title.style.color = CATEGORY_COLORS[cat];
  const dot = document.createElement('span');
  dot.className = 'dot';
  dot.style.background = CATEGORY_COLORS[cat];
  title.appendChild(dot);
  title.appendChild(document.createTextNode(cat));
  block.appendChild(title);

  LOCATIONS.filter(l => l.category === cat).forEach(loc => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `<span class="n">${loc.id}.</span><span>${loc.name}</span>`;
    row.addEventListener('click', () => {
      closeSheets();
      panToLocation(loc, 0);
      setTimeout(() => openDetail(loc, 0), 350);
    });
    block.appendChild(row);
  });
  legendContent.appendChild(block);
});

document.getElementById('legendToggle').addEventListener('click', () => {
  detailSheet.classList.remove('show');
  legendSheet.classList.add('show');
  sheetBackdrop.classList.add('show');
});

function edgeGeom(e){ const g=[]; for(let i=2;i<e.length;i+=2) g.push([e[i],e[i+1]]); return g; }
function polyLen(g){ let s=0; for(let i=1;i<g.length;i++){ s+=Math.hypot(g[i][0]-g[i-1][0], g[i][1]-g[i-1][1]); } return s; }

function computeRoute(keyA, keyB){
  const pA = NET.p[keyA], pB = NET.p[keyB];
  if(!pA || !pB) return null;
  // build adjacency with the two snap points spliced into their edges
  const adj = new Map();
  function add(u,v,w,geom){
    if(!adj.has(u)) adj.set(u,[]);
    if(!adj.has(v)) adj.set(v,[]);
    adj.get(u).push([v,w,geom]);
    adj.get(v).push([u,w,geom.slice().reverse()]);
  }
  const special = new Map();
  [['S',pA],['T',pB]].forEach(([tag,p])=>{
    if(!special.has(p[0])) special.set(p[0],[]);
    special.get(p[0]).push([tag,p]);
  });
  NET.e.forEach((e,ei)=>{
    const g = edgeGeom(e);
    if(!special.has(ei)){ add('N'+e[0],'N'+e[1],polyLen(g),g); return; }
    const marks = special.get(ei).slice().sort((a,b)=>a[1][1]-b[1][1]);
    let cur = 'N'+e[0], geom=[g[0]], idx=0;
    for(let si=0; si<g.length-1; si++){
      while(idx<marks.length && marks[idx][1][1]===si){
        const [tag,p]=marks[idx];
        geom.push([p[2],p[3]]);
        add(cur, tag, polyLen(geom), geom);
        cur = tag; geom = [[p[2],p[3]]];
        idx++;
      }
      geom.push(g[si+1]);
    }
    add(cur,'N'+e[1],polyLen(geom),geom);
  });
  // Dijkstra
  const dist=new Map([['S',0]]), prev=new Map();
  const pq=[[0,'S']];
  while(pq.length){
    let bi=0; for(let i=1;i<pq.length;i++) if(pq[i][0]<pq[bi][0]) bi=i;
    const [d,u]=pq.splice(bi,1)[0];
    if(d>(dist.get(u)??Infinity)) continue;
    if(u==='T') break;
    for(const [v,w,geom] of (adj.get(u)||[])){
      const nd=d+w;
      if(nd<(dist.get(v)??Infinity)){ dist.set(v,nd); prev.set(v,[u,geom]); pq.push([nd,v]); }
    }
  }
  if(!dist.has('T')) return null;
  let path=[], u='T';
  while(u!=='S'){ const [pu,geom]=prev.get(u); path=geom.concat(path); u=pu; }
  return { px: dist.get('T') + pA[4] + pB[4], path, snapA:[pA[2],pA[3]], snapB:[pB[2],pB[3]] };
}

const routeSvg = document.getElementById('routeSvg');
let activeRoute = null;   // {fromKey, toKey}

function pinXY(key){
  const [id, inst] = key.split('.').map(Number);
  const loc = LOCATIONS.find(l=>l.id===id);
  const pt = loc.points[inst];
  return [pt.x/100*1200, pt.y/100*938, loc, inst];
}

function drawRoute(fromKey, toKey){
  const r = computeRoute(fromKey, toKey);
  if(!r){ showToast('No walking route found'); return false; }
  const [ax,ay] = pinXY(fromKey), [bx,by] = pinXY(toKey);
  const pathStr = r.path.map((p,i)=>(i?'L':'M')+p[0]+' '+p[1]).join(' ');
  routeSvg.innerHTML =
    '<path d="'+pathStr+'" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>' +
    '<path d="'+pathStr+'" fill="none" stroke="#0e7c9e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<line x1="'+ax+'" y1="'+ay+'" x2="'+r.snapA[0]+'" y2="'+r.snapA[1]+'" stroke="#0e7c9e" stroke-width="4" stroke-dasharray="7 7"/>' +
    '<line x1="'+bx+'" y1="'+by+'" x2="'+r.snapB[0]+'" y2="'+r.snapB[1]+'" stroke="#0e7c9e" stroke-width="4" stroke-dasharray="7 7"/>' +
    '<circle cx="'+ax+'" cy="'+ay+'" r="9" fill="#1a9850" stroke="#fff" stroke-width="3"/>' +
    '<circle cx="'+bx+'" cy="'+by+'" r="9" fill="#d73027" stroke="#fff" stroke-width="3"/>';
  activeRoute = { fromKey, toKey };
  const meters = r.px * M_PER_PX;
  const mins = Math.max(1, Math.round(meters / WALK_M_PER_MIN));
  const miles = meters/1609.34;
  const distStr = miles >= 0.15 ? miles.toFixed(1)+' mi' : Math.round(meters*3.281/10)*10+' ft';
  const [,,locA] = pinXY(fromKey), [,,locB] = pinXY(toKey);
  document.getElementById('routeText').textContent =
    '~'+mins+' min walk \u00b7 '+distStr+' (approx.) \u2014 '+locA.name+' \u2192 '+locB.name;
  document.getElementById('routeInfo').classList.add('show');
  // fit route in view
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  r.path.concat([[ax,ay],[bx,by]]).forEach(p=>{
    minX=Math.min(minX,p[0]); maxX=Math.max(maxX,p[0]);
    minY=Math.min(minY,p[1]); maxY=Math.max(maxY,p[1]);
  });
  const rect = mapScroll.getBoundingClientRect();
  const fit = Math.min(MAX_SCALE, Math.max(MIN_SCALE,
    Math.min(rect.width/((maxX-minX)+120), rect.height/((maxY-minY)+120))));
  setScale(fit);
  requestAnimationFrame(()=>{
    mapScroll.scrollTo({
      left:(minX+maxX)/2*scale - rect.width/2,
      top:(minY+maxY)/2*scale - rect.height/2,
      behavior:'smooth'
    });
  });
  return true;
}

function clearRoute(){
  routeSvg.innerHTML='';
  activeRoute = null;
  document.getElementById('routeInfo').classList.remove('show');
  if(location.hash.startsWith('#d=')) history.replaceState(null,'',location.pathname+location.search);
}
document.getElementById('routeClear').addEventListener('click', clearRoute);

// ---- pick-start mode ----

// ---- share ----
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(showToast._h);
  showToast._h = setTimeout(()=>t.classList.remove('show'), 2200);

async function shareUrl(url, title){
  if(navigator.share){
    try { await navigator.share({title, url}); return; } catch(e){ if(e.name==='AbortError') return; }
  }
  try {
    await navigator.clipboard.writeText(url);
    showToast('Link copied \u2014 paste it in your group text');
  } catch(e){
    prompt('Copy this link:', url);
  }
}
document.getElementById('shareBtn').addEventListener('click', ()=>{
  if(!currentLoc) return;
  const url = location.origin + location.pathname + '#p=' + currentLoc.id + '.' + currentPt;
  history.replaceState(null,'',url);
  shareUrl(url, currentLoc.name + ' \u2014 Beaches T&C map');
});
document.getElementById('routeShare').addEventListener('click', ()=>{
  if(!activeRoute) return;
  const url = location.origin + location.pathname + '#d=' + activeRoute.fromKey + '-' + activeRoute.toKey;
  history.replaceState(null,'',url);
  shareUrl(url, 'Walking route \u2014 Beaches T&C map');
});

// ---- deep link handling ----
function applyHash(){
  const h = location.hash;
  let m;
  if((m = h.match(/^#p=(\d+)\.(\d+)$/))){
    const loc = LOCATIONS.find(l=>l.id===+m[1]);
    if(loc && loc.points[+m[2]]){
      panToLocation(loc, +m[2]);
      setTimeout(()=>openDetail(loc, +m[2]), 400);
    }
  } else if((m = h.match(/^#d=(\d+\.\d+)-(\d+\.\d+)$/))){
    if(NET.p[m[1]] && NET.p[m[2]]) drawRoute(m[1], m[2]);
  }
}
window.addEventListener('hashchange', applyHash);

// ================= Geolocation: calibration harness + live dot =================
// Calibration maps GPS (lat/lon) -> map pixels via an affine transform fitted
// from fixes captured at known pins. Needs >=2 fixes (similarity), >=3 preferred (affine).
const CAL_KEY = 'btc_cal_v1';
let calFixes = [];        // {label, mapX, mapY, lat, lon, acc}
let calTransform = null;  // {lat0, lon0, A:[a,b,c,d,e,f], pxPerM}
let calibrating = false;

// Returns null if geolocation should work, otherwise a human-readable reason + hint.
function geoUnavailableReason(){
  if(!window.isSecureContext){
    return "Location needs the secure (https://) address. Open the map from its GitHub Pages link \\u2014 not a saved file or a plain http:// address.";
  }
  if(!('geolocation' in navigator) || !navigator.geolocation){
    return "This browser view is blocking location. If you opened the map from a link inside another app (Messages, Mail, Instagram\\u2026), tap \\u201cOpen in Safari/Chrome\\u201d and try again.";
  }
  // In-app browser sniff \\u2014 these WebViews often silently withhold the GPS prompt
  const ua = navigator.userAgent || '';
  if(/(FBAN|FBAV|Instagram|Line|Twitter|WhatsApp|Snapchat|GSA)/i.test(ua)){
    return "You appear to be in an app\\u2019s built-in browser, which can block location. Tap the \\u2026 menu and choose \\u201cOpen in Safari/Chrome,\\u201d then try again.";
  }
  return null;
}

// Persistent, actionable status shown in the calibration banner (survives longer than a toast).
function setCalBannerMessage(html){
  const span = calBanner.querySelector('span');
  if(span) span.innerHTML = html;
}
function resetCalBannerMessage(){
  setCalBannerMessage('Calibration: stand <b>at a landmark</b>, then tap its pin');
}
let watchId = null;
let memStore = {};        // fallback if localStorage unavailable

function storeGet(k){ try { return localStorage.getItem(k); } catch(e){ return memStore[k] ?? null; } }
function storeSet(k,v){ try { localStorage.setItem(k,v); } catch(e){ memStore[k]=v; } }
function storeDel(k){ try { localStorage.removeItem(k); } catch(e){ delete memStore[k]; } }

function loadCal(){
  const raw = storeGet(CAL_KEY);
  if(!raw) return;
  try {
    const o = JSON.parse(raw);
    calFixes = o.fixes || [];
    calTransform = o.transform || null;
  } catch(e){}
}
function saveCal(){
  storeSet(CAL_KEY, JSON.stringify({fixes: calFixes, transform: calTransform}));
}

function toLocalMeters(lat, lon, lat0, lon0){
  const E = (lon - lon0) * 111320 * Math.cos(lat0 * Math.PI/180);
  const N = (lat - lat0) * 110540;
  return [E, N];
}

function fitTransform(fixes){
  if(fixes.length < 2) return null;
  const lat0 = fixes[0].lat, lon0 = fixes[0].lon;
  const P = fixes.map(f => ({en: toLocalMeters(f.lat, f.lon, lat0, lon0), x: f.mapX, y: f.mapY}));
  let A;
  if(fixes.length === 2){
    // similarity: x = a*E - b*N + c ; y = b*E + a*N + f  (rotation+uniform scale)
    const [e1,n1] = P[0].en, [e2,n2] = P[1].en;
    const dE = e2-e1, dN = n2-n1, dx = P[1].x-P[0].x, dy = P[1].y-P[0].y;
    const den = dE*dE + dN*dN;
    if(den < 1e-9) return null;
    const a = (dx*dE + dy*dN)/den, b = (dy*dE - dx*dN)/den;
    const c = P[0].x - (a*e1 - b*n1);
    const f = P[0].y - (b*e1 + a*n1);
    A = [a, -b, c, b, a, f];
  } else {
    // least-squares affine: solve M^T M coeffs = M^T v for x and y separately
    let S=[[0,0,0],[0,0,0],[0,0,0]], vx=[0,0,0], vy=[0,0,0];
    for(const p of P){
      const r = [p.en[0], p.en[1], 1];
      for(let i=0;i<3;i++){
        for(let j=0;j<3;j++) S[i][j] += r[i]*r[j];
        vx[i] += r[i]*p.x; vy[i] += r[i]*p.y;
      }
    }
    function solve3(M, v){
      const m = M.map((row,i)=>[...row, v[i]]);
      for(let c=0;c<3;c++){
        let piv = c;
        for(let r=c+1;r<3;r++) if(Math.abs(m[r][c])>Math.abs(m[piv][c])) piv=r;
        if(Math.abs(m[piv][c]) < 1e-12) return null;
        [m[c],m[piv]]=[m[piv],m[c]];
        for(let r=0;r<3;r++){
          if(r===c) continue;
          const k = m[r][c]/m[c][c];
          for(let cc=c;cc<4;cc++) m[r][cc]-=k*m[c][cc];
        }
      }
      return [m[0][3]/m[0][0], m[1][3]/m[1][1], m[2][3]/m[2][2]];
    }
    const cx = solve3(S, vx), cy = solve3(S, vy);
    if(!cx || !cy) return null;
    A = [cx[0], cx[1], cx[2], cy[0], cy[1], cy[2]];
  }
  // px per meter ~ average of the two row norms
  const pxPerM = (Math.hypot(A[0],A[1]) + Math.hypot(A[3],A[4]))/2;
  if(!isFinite(pxPerM) || pxPerM <= 0) return null;
  return {lat0, lon0, A, pxPerM};
}

function gpsToMap(lat, lon){
  if(!calTransform) return null;
  const [E,N] = toLocalMeters(lat, lon, calTransform.lat0, calTransform.lon0);
  const A = calTransform.A;
  return [A[0]*E + A[1]*N + A[2], A[3]*E + A[4]*N + A[5]];
}

function residuals(){
  if(!calTransform) return [];
  return calFixes.map(f => {
    const m = gpsToMap(f.lat, f.lon);
    const dpx = Math.hypot(m[0]-f.mapX, m[1]-f.mapY);
    return dpx / calTransform.pxPerM;   // meters
  });
}

// ---- UI: setup sheet ----
const calSheet = document.getElementById('calSheet');
const calBanner = document.getElementById('calBanner');

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function renderCalSheet(){
  const body = document.getElementById('calBody');
  let h = '';
  const reason = geoUnavailableReason();
  if(reason){
    h += '<div class="cal-status warn">\u26a0\ufe0f ' + reason + '</div>';
  }
  h += '<p>To place the blue dot on this illustrated map, capture a GPS fix while standing at <b>2&ndash;4 landmarks</b> spread across the resort (e.g. main entrance, a village lobby, the waterpark). More spread = better accuracy.</p>';
  if(calFixes.length){
    calFixes.forEach((f,i)=>{
      h += '<div class="cal-fix"><b>'+esc(f.label)+'</b><span>&plusmn;'+Math.round(f.acc)+'m GPS</span>'
        + '<span class="res" id="res'+i+'"></span>'
        + '<button data-del="'+i+'">&#10005;</button></div>';
    });
  }
  if(calTransform){
    const rs = residuals();
    const worst = Math.max(...rs);
    const cls = worst < 25 ? 'good' : 'warn';
    h += '<div class="cal-status '+cls+'">Calibrated &mdash; worst fit error ~'+Math.round(worst)+' m</div>';
  } else if(calFixes.length === 1){
    h += '<div class="cal-status">1 fix captured &mdash; need at least 2</div>';
  }
  h += '<div class="sheet-actions">';
  h += '<button class="action-btn primary" id="calStart">&#10133; Capture a fix</button>';
  if(calTransform){
    h += '<button class="action-btn secondary" id="calShare">&#128279; Share calibration</button>';
    h += '<button class="action-btn secondary" id="calReset">Reset</button>';
  } else if(calFixes.length){
    h += '<button class="action-btn secondary" id="calReset">Reset</button>';
  }
  h += '</div>';
  body.innerHTML = h;
  if(calTransform){
    const rs = residuals();
    rs.forEach((r,i)=>{ const el=document.getElementById('res'+i); if(el) el.textContent='fit '+Math.round(r)+'m'; });
  }
  body.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click', ()=>{
      calFixes.splice(+b.dataset.del, 1);
      calTransform = fitTransform(calFixes);
      saveCal(); renderCalSheet();
    });
  });
  const st = document.getElementById('calStart');
  if(st) st.addEventListener('click', ()=>{
    const reason = geoUnavailableReason();
    calSheet.classList.remove('show'); sheetBackdrop.classList.remove('show');
    calibrating = true;
    if(reason){
      setCalBannerMessage('\u26a0\ufe0f ' + reason);
    } else {
      setCalBannerMessage('Zoom to the landmark you\u2019re standing at, then tap its pin');
    }
    calBanner.classList.add('show');
    // Keep the current zoom \u2014 pins must stay large enough to tap accurately.
  });
  const sh = document.getElementById('calShare');
  if(sh) sh.addEventListener('click', ()=>{
    const payload = btoa(JSON.stringify({fixes:calFixes, transform:calTransform}));
    const url = location.origin + location.pathname + '#cal=' + payload;
    shareUrl(url, 'Location setup \u2014 Beaches T&C map');
  });
  const rs = document.getElementById('calReset');
  if(rs) rs.addEventListener('click', ()=>{
    calFixes = []; calTransform = null; storeDel(CAL_KEY); stopWatch(); renderCalSheet();
  });
}

function openCalSheet(){
  legendSheet.classList.remove('show'); detailSheet.classList.remove('show');
  renderCalSheet();
  sheetBackdrop.classList.add('show');
  calSheet.classList.add('show');
}
document.getElementById('calDone').addEventListener('click', ()=>{
  calibrating = false; calBanner.classList.remove('show'); openCalSheet();
});

// capture flow: called from pin tap while calibrating
function captureFixAt(loc, inst){
  const pt = loc.points[inst];

  // Guard first \u2014 a missing geolocation object throws before any prompt, which is
  // exactly what looks like "nothing happened / it never asked me."
  const reason = geoUnavailableReason();
  if(reason){
    setCalBannerMessage('\u26a0\ufe0f ' + reason);
    showToast('Location unavailable in this browser');
    return;
  }

  let done = false;
  setCalBannerMessage('Requesting location\u2026 allow the prompt, then stand still');

  function onFix(pos){
    if(done) return; done = true;
    calFixes.push({
      label: loc.name,
      mapX: pt.x/100*1200, mapY: pt.y/100*938,
      lat: pos.coords.latitude, lon: pos.coords.longitude,
      acc: pos.coords.accuracy || 0
    });
    calTransform = fitTransform(calFixes);
    saveCal();
    showToast('Fix saved at '+loc.name+' ('+calFixes.length+' total)');
    if(calFixes.length >= 2 && calTransform){
      calibrating = false; calBanner.classList.remove('show'); resetCalBannerMessage(); openCalSheet();
    } else {
      setCalBannerMessage('Saved. Now stand at another landmark and tap its pin');
    }
  }
  function onErr(err){
    if(done) return; done = true;
    let msg;
    if(err && err.code === 1){
      msg = 'Location permission was blocked. Enable it for this site (browser address bar / iOS Settings \u2192 Safari \u2192 Location), then tap the pin again.';
    } else if(err && err.code === 3){
      msg = 'Location timed out. Step outside for a clearer sky view and tap the pin again.';
    } else {
      msg = 'Could not read GPS' + (err && err.message ? ' (' + err.message + ')' : '') + '. Tap the pin to retry.';
    }
    setCalBannerMessage('\u26a0\ufe0f ' + msg);
  }

  function request(){
    try {
      navigator.geolocation.getCurrentPosition(onFix, onErr,
        {enableHighAccuracy:true, timeout:15000, maximumAge:0});
    } catch(e){
      onErr({code:0, message:e.message});
    }
  }

  // If the Permissions API reports a prior "denied", the prompt will NOT reappear \u2014
  // tell the user how to unblock instead of leaving them tapping a silent pin.
  if(navigator.permissions && navigator.permissions.query){
    navigator.permissions.query({name:'geolocation'}).then(st => {
      if(st.state === 'denied'){
        onErr({code:1});
      } else {
        request();  // 'granted' or 'prompt' \u2014 either way, ask now
      }
    }).catch(request);
  } else {
    request();
  }
}

// ---- live dot ----
const userSvg = document.getElementById('userSvg');
const userWrap = document.createElement('div');
userWrap.className = 'user-dot-wrap';
userWrap.innerHTML = '<div class="user-dot"></div>';
pinLayer.appendChild(userWrap);
const locateBtn = document.getElementById('locateBtn');
let firstFixCentered = false;

function updateUserDot(pos){
  const m = gpsToMap(pos.coords.latitude, pos.coords.longitude);
  if(!m) return;
  const [x,y] = m;
  const off = x < -30 || x > 1230 || y < -30 || y > 968;
  if(off){
    userWrap.style.display='none'; userSvg.innerHTML='';
    showToast('You appear to be outside the map area');
    return;
  }
  userWrap.style.display='block';
  userWrap.style.left = (x/1200*100)+'%';
  userWrap.style.top = (y/938*100)+'%';
  const rPx = (pos.coords.accuracy || 10) * calTransform.pxPerM;
  userSvg.innerHTML = '<circle cx="'+x+'" cy="'+y+'" r="'+rPx.toFixed(1)+'" fill="#1a73e8" opacity="0.14"/>';
  if(!firstFixCentered){
    firstFixCentered = true;
    const rect = mapScroll.getBoundingClientRect();
    if(scale < 1.2) setScale(1.5);
    requestAnimationFrame(()=>{
      mapScroll.scrollTo({left:x*scale-rect.width/2, top:y*scale-rect.height/2, behavior:'smooth'});
    });
  }
}
function startWatch(){
  if(watchId !== null) return;
  const reason = geoUnavailableReason();
  if(reason){ showToast('Location unavailable'); openCalSheet(); return; }
  firstFixCentered = false;
  try {
    watchId = navigator.geolocation.watchPosition(updateUserDot,
      err => {
        const m = err && err.code === 1
          ? 'Location blocked \u2014 enable it for this site and tap \ud83d\udccd again'
          : 'Location error: ' + (err && err.message ? err.message : 'unknown');
        showToast(m); stopWatch();
      },
      {enableHighAccuracy:true, maximumAge:3000, timeout:20000});
    locateBtn.classList.add('on');
  } catch(e){
    showToast('Location unavailable in this browser'); openCalSheet();
  }
}
function stopWatch(){
  if(watchId !== null){ navigator.geolocation.clearWatch(watchId); watchId = null; }
  userWrap.style.display='none'; userSvg.innerHTML='';
  locateBtn.classList.remove('on');
}
locateBtn.addEventListener('click', ()=>{
  if(watchId !== null){ stopWatch(); return; }
  if(calTransform) startWatch(); else openCalSheet();
});

// accept shared calibration via deep link
(function(){
  const m = location.hash.match(/^#cal=(.+)$/);
  if(m){
    try {
      const o = JSON.parse(atob(m[1]));
      if(o.transform && o.fixes){
        calFixes = o.fixes; calTransform = o.transform; saveCal();
        showToast('Location setup received \u2014 tap \ud83d\udccd to use it');
        history.replaceState(null,'',location.pathname+location.search);
      }
    } catch(e){}
  }
})();
loadCal();


mapImg.addEventListener('load', () => {
  layoutHeight();
  setScale(MIN_SCALE);   // start with the whole resort in view
  applyHash();           // honor a shared deep link
});
layoutHeight();
